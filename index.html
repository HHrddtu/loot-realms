<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loot Realms</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%230a0a1a'/><text x='16' y='22' text-anchor='middle' font-size='20' fill='%23f1c40f'>⚔</text></svg>" type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            border: 2px solid #333;
        }
        #game-container input,
        #game-container input[type="text"],
        #game-container input[type="password"],
        #game-container input[type="email"] {
            background: transparent !important;
            color: #d0d0d0 !important;
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            -webkit-box-shadow: none !important;
            -webkit-appearance: none !important;
            -moz-appearance: none !important;
            appearance: none !important;
            border-radius: 0 !important;
            caret-color: #f1c40f !important;
        }
        #game-container input::placeholder {
            color: #555 !important;
            opacity: 1 !important;
        }
        #game-container input:-webkit-autofill,
        #game-container input:-webkit-autofill:hover,
        #game-container input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #12121f inset !important;
            -webkit-text-fill-color: #d0d0d0 !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>document.addEventListener('contextmenu', e => e.preventDefault());</script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
